<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>AurumX - Kivét Tervező & Grafikon by Gemini</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js betöltése a grafikonhoz -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
    <div class="lang-switcher" style="text-align: right; margin-bottom: 10px;">
        <select id="langSelect" onchange="nyelvValtas(this.value)">
            <option value="hu">HU</option>
            <option value="en">EN</option>
        </select>
    </div>
<header>
     <h1 id="mainTitle">AurumX</h1>
     <p id="subTitle" class="subtitle"></p>

<!-- ÚJ, JAVÍTOTT: Navigációs menüsor és fix méretű Help gomb -->
<div class="nav-container" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px;">
    <div class="tabs" style="display: flex;">
        <button id="btnTabMonth" onclick="valtsTab('month')" style="background: #d4af37; color: #000; border: none; padding: 10px 15px; font-weight: bold; border-radius: 4px 4px 0 0; cursor: pointer; margin-right: 5px; width: auto; min-width: 120px;">Havi Kivét</button>
        <button id="btnTabStartCap" onclick="valtsTab('startcap')" style="background: #222; color: #888; border: 1px solid #333; padding: 10px 15px; font-weight: bold; border-radius: 4px 4px 0 0; cursor: pointer; width: auto; min-width: 120px;">Kezdőtőke</button>
    </div>
    <!-- Golyóálló Help gomb, ami kizárólag a mutatHelp()-et indítja el -->
    <button id="btnFixHelp" onclick="mutatHelp()" style="background: transparent; color: #d4af37; border: 1px solid #d4af37; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: auto; white-space: nowrap; flex-shrink: 0;">? Help / Info</button>
</div>

<!-- Az 1. ALGORITMUS MEZŐI -->
<div id="panel-month">
   <div class="input-group">
        <div class="input-box">
            <label id="lblKezdotoke" for="kezdotoke"></label>
            <input type="number" id="kezdotoke" value="500" step="100" min="0">
        </div>
        <div class="input-box">
            <label id="lblKivet" for="kivet"></label>
            <input type="number" id="kivet" value="500" min="1">
        </div>
        <div class="input-box">
            <label id="lblHavikamat" for="kamat"></label>
            <input type="number" id="kamat" value="15" step="0.1" min="8" max="25">
        </div>
        <div class="input-box">
            <label id="lblKezdotokekivet" for="tokeVisszavet"></label>
            <select id="tokeVisszavet">
                <option id="optNem" value="NEM">NEM</option>
                <option id="optIgen" value="IGEN">IGEN</option>
            </select>
        </div>
    </div>
    <button id="btnSzamolas" onclick="szamolas_month()"></button>
</div>

<!-- A 2. ALGORITMUS MEZŐI -->
<div id="panel-startcap" style="display: none;">
    <div class="input-group">
        <div class="input-box">
            <label id="lblKivantKivetText"></label>
            <input type="number" id="startcap-kivet" value="1000">
        </div>
        
        <div class="input-box">
            <label id="lblHavikamatText"></label>
            <input type="number" id="startcap-kamat" value="15" step="0.1" min="8" max="25">
        </div>
        
        <div class="input-box">
            <label id="lblCelHonapText"></label>
            <input type="number" id="startcap-honap" value="24">
        </div>

        <div class="input-box">
            <label id="lblKiveszTokeText"></label>
            <select id="startcap-kivesz">
                <option id="optStartcapNem" value="NEM">NEM</option>
                <option id="optStartcapIgen" value="IGEN">IGEN</option>
            </select>
        </div>
    </div>
    
    <button onclick="szamolKezdotoke()" id="btnStartcapSzamol" style="width:100%; background:#d4af37; color:#000; border:none; padding:12px; font-weight:bold; border-radius:4px; cursor:pointer; font-size:16px; margin-top:15px; margin-bottom:20px;"></button>

    <!-- Ideiglenes eredményjelző zóna -->
    <div id="startcap-eredmeny" style="display:none; background:#1a1a1a; border:1px solid #d4af37; padding:15px; border-radius:6px; margin-bottom:20px; text-align:center;">
        <p><span id="resSzuksegesLabel" style="color:#888;"></span> <b id="resSzuksegesErtek" style="color:#fff; font-size:18px;"></b></p>
        <p><span id="resKerekitettLabel" style="color:#888;"></span> <b id="resKerekitettErtek" style="color:#d4af37; font-size:22px;"></b></p>
    </div>
</div>

    </header>

    <!-- Állandó tájékoztató szöveg az adatbeviteli képernyő alján -->
    <p id="disclaimerText" style="color:#fff; font-size: 0.8rem; text-align:center; margin:20px 0;"></p>

    <div id="resultBox" class="result-box">
        <p id="resultText" class="result-text"></p>
    </div>

    <!-- Grafikon doboza -->
    <div id="chartWrapper" class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <button id="toggleBtn" class="toggle-btn" onclick="toggleTable()">btnTablamutat</button>

    <div id="tableContainer" class="table-container">
        <table>
            <thead>
                <tr>
                    <th id="cimIdo"></th>
                    <th id="cimNytoke"></th>
                    <th id="cimHkamat"></th>
                    <th id="cimZtoke"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <!-- Hibaüzenet Modal - h2-vel a szintkihagyás ellen -->
    <div id="customAlert" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 1000;">
         <div style="background: #1e1e1e; color: #fff; border: 2px solid #d4af37; width: 320px; margin: 15% auto; padding: 20px; text-align: center; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
           <h2 id="alertHeader" style="color: #d4af37; margin-top: 0; font-family: sans-serif; font-size: 20px;">langPack.alertTitle</h2>
           <p id="alertMessage" style="margin: 20px 0; font-family: sans-serif; line-height: 1.4;"></p>
           <button onclick="bezarAlert()" style="background: #d4af37; color: #000; border: none; padding: 8px 25px; font-weight: bold; border-radius: 4px; cursor: pointer;">OK</button>
         </div>
    </div>
</div>

<!-- Különálló, fix és széles Help ablak -->
<div id="helpModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999;">
    <div class="modal-content-help" style="width: 90%; max-width: 1050px; margin: 5% auto; background:#1a1a1a; border: 2px solid #d4af37; padding:30px; border-radius:8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); box-sizing: border-box;">
        <h2 id="helpHeader" style="margin-top: 0; color: #d4af37; text-align: center; font-family: sans-serif;">Info</h2>
        <div id="helpBody" style="white-space: pre-wrap; line-height: 1.6; margin-top: 20px; color: #eee; font-size: 15px; font-family: sans-serif;"></div>
        <button id="helpCloseBtn" class="help-close-btn" onclick="bezarHelp()" style="display: block; margin: 30px auto 10px auto; padding: 10px 30px; background-color: #d4af37; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;"></button>
    </div>
</div>

<script src="lang.js"></script>
<script src="app.js"></script>
<script src="algo-month.js"></script>
<script src="algo-startcap.js"></script>
<script src="chart.js"></script>
<script src="pdf-iras.js"></script>

</body>
</html>
